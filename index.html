<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarthagoLex - Assistant Juridique IA</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); height: 100vh; display: flex; justify-content: center; align-items: center; }
        .chat-container { width: 95%; max-width: 900px; height: 90vh; background: white; border-radius: 15px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); display: flex; flex-direction: column; overflow: hidden; }
        .chat-header { background: #2c3e50; color: white; padding: 20px; text-align: center; border-radius: 15px 15px 0 0; }
        .chat-header h1 { font-size: 28px; margin-bottom: 5px; }
        .chat-header p { font-size: 14px; opacity: 0.8; }
        .mode-selector { background: #34495e; padding: 10px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .mode-btn { padding: 8px 15px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 13px; transition: all 0.3s; }
        .mode-btn:hover { background: #2980b9; transform: translateY(-2px); }
        .mode-btn.active { background: #e74c3c; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; background: #ecf0f1; }
        .message { margin-bottom: 15px; display: flex; align-items: flex-start; }
        .message.user { flex-direction: row-reverse; }
        .message-content { max-width: 70%; padding: 12px 18px; border-radius: 18px; word-wrap: break-word; }
        .message.user .message-content { background: #3498db; color: white; border-bottom-right-radius: 4px; }
        .message.bot .message-content { background: white; color: #2c3e50; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-bottom-left-radius: 4px; }
        .message-avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; margin: 0 10px; }
        .message.user .message-avatar { background: #3498db; color: white; }
        .message.bot .message-avatar { background: #e74c3c; color: white; }
        .chat-input-area { background: white; padding: 20px; border-top: 1px solid #bdc3c7; }
        .input-wrapper { display: flex; gap: 10px; }
        #userMessage { flex: 1; padding: 12px 15px; border: 2px solid #bdc3c7; border-radius: 25px; font-size: 15px; outline: none; }
        #userMessage:focus { border-color: #3498db; }
        #sendBtn { padding: 12px 30px; background: #3498db; color: white; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; transition: all 0.3s; }
        #sendBtn:hover { background: #2980b9; }
        .loading { display: none; padding: 12px; background: white; border-radius: 18px; }
        .loading.active { display: block; }
        .typing-indicator { display: flex; gap: 5px; }
        .typing-indicator span { width: 8px; height: 8px; background: #95a5a6; border-radius: 50%; animation: typing 1.4s infinite; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-10px); } }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>👩‍⚖️ CarthagoLex</h1>
            <p>Votre assistant juridique expert en droit des étrangers</p>
        </div>
        <div class="mode-selector">
            <button class="mode-btn active" onclick="setMode('analyse_risque')">Analyse de Risque</button>
            <button class="mode-btn" onclick="setMode('controle_qualite')">Contrôle Qualité</button>
            <button class="mode-btn" onclick="setMode('interpretation_texte')">Interprétation</button>
            <button class="mode-btn" onclick="setMode('redaction_recours')">Recours</button>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="message bot">
                <div class="message-avatar">CL</div>
                <div class="message-content">Bonjour ! Je suis CarthagoLex, votre assistant juridique spécialisé en droit des étrangers. Comment puis-je vous aider aujourd'hui ?</div>
            </div>
        </div>
        <div class="chat-input-area">
            <div class="input-wrapper">
                <input type="text" id="userMessage" placeholder="Posez votre question juridique..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button id="sendBtn" onclick="sendMessage()">➤ Envoyer</button>
            </div>
        </div>
    </div>

    <script>
        let currentMode = 'analyse_risque';
        let conversationHistory = [];

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        function addMessage(content, isUser = false) {
            const messagesDiv = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'bot'}`;
            messageDiv.innerHTML = `
                <div class="message-avatar">${isUser ? 'U' : 'CL'}</div>
                <div class="message-content">${content}</div>
            `;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function showTypingIndicator() {
            const messagesDiv = document.getElementById('chatMessages');
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message bot loading active';
            loadingDiv.id = 'typingIndicator';
            loadingDiv.innerHTML = `
                <div class="message-avatar">CL</div>
                <div class="message-content">
                    <div class="typing-indicator">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            messagesDiv.appendChild(loadingDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        async function sendMessage() {
            const input = document.getElementById('userMessage');
            const message = input.value.trim();
            if (!message) return;

            addMessage(message, true);
            conversationHistory.push({ role: 'user', content: message });
            input.value = '';

            showTypingIndicator();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        historique: conversationHistory,
                        mode: currentMode
                    })
                });

                const data = await response.json();
                removeTypingIndicator();

                if (data.status === 'success') {
                    addMessage(data.response);
                    conversationHistory.push({ role: 'assistant', content: data.response });
                } else {
                    addMessage('⚠️ ' + (data.response || 'Erreur de traitement.'));
                }
            } catch (error) {
                removeTypingIndicator();
                addMessage('❌ Erreur de connexion au serveur. Vérifiez que le backend Flask est démarré.');
            }
        }
    </script>
</body>
</html>
