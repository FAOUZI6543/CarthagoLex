<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détail du GPT</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            text-align: center;
        }
        header {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            font-size: 24px;
        }
        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background: white;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }
        footer {
            background: #2c3e50;
            color: white;
            padding: 10px;
            margin-top: 20px;
        }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 20px;
        }
        .btn:hover {
            background: #2980b9;
        }
    </style>
</head>
<body>
    <header>
        <a href="/" style="color:white;text-decoration:none;">CarthagoLex</a>
    </header>
    <div class="container">
        <div id="gpt-detail"></div>
        <p><a href="/gpts" class="btn">Retour</a></p>
    </div>
    <footer>
        &copy; 2025 CarthagoLex - Tous droits réservés.
    </footer>
    <script type="module">
        import { gpts } from '../data/gpts.js';

        const slug = window.location.pathname.split('/').pop().replace('.html', '');
        const gpt = gpts.find(g => g.slug === slug);
        const container = document.getElementById('gpt-detail');

        if (gpt) {
            container.innerHTML = `
                <h1>${gpt.name}</h1>
                <p>${gpt.description}</p>
                <p><strong>Tags :</strong> ${gpt.tags.join(', ')}</p>
            `;
        } else {
            container.innerHTML = '<p>GPT introuvable.</p>';
        }
    </script>
</body>
</html>
