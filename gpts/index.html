<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tous les GPTs</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            text-align: center;
        }
        header {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            font-size: 24px;
        }
        .container {
            max-width: 1000px;
            margin: 20px auto;
            padding: 20px;
            background: white;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }
        .gpt-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        .gpt-card {
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 10px;
            width: 250px;
            background: #fafafa;
            text-align: left;
        }
        .gpt-card h3 {
            margin-top: 0;
        }
        footer {
            background: #2c3e50;
            color: white;
            padding: 10px;
            margin-top: 20px;
        }
        .controls {
            margin-bottom: 20px;
        }
        input, select {
            padding: 8px;
            margin: 5px;
        }
    </style>
</head>
<body>
    <header>
        <a href="/" style="color:white;text-decoration:none;">CarthagoLex</a>
    </header>
    <div class="container">
        <h1>Tous les GPTs</h1>
        <div class="controls">
            <input id="search" placeholder="Recherche..."/>
            <select id="sort">
                <option value="asc">Nom A-Z</option>
                <option value="desc">Nom Z-A</option>
            </select>
        </div>
        <div id="gpt-grid" class="gpt-grid"></div>
    </div>
    <footer>
        &copy; 2025 CarthagoLex - Tous droits réservés.
    </footer>
    <script type="module">
        import { gpts } from '../data/gpts.js';
        import { GPTCard } from '../scripts/gpt-card.js';

        const grid = document.getElementById('gpt-grid');
        const search = document.getElementById('search');
        const sort = document.getElementById('sort');

        function render(list) {
            grid.innerHTML = '';
            list.forEach(g => grid.appendChild(GPTCard(g)));
        }

        function apply() {
            let list = gpts.filter(g =>
                g.name.toLowerCase().includes(search.value.toLowerCase()) ||
                g.description.toLowerCase().includes(search.value.toLowerCase())
            );
            list.sort((a, b) =>
                sort.value === 'desc'
                    ? b.name.localeCompare(a.name)
                    : a.name.localeCompare(b.name)
            );
            render(list);
        }

        search.addEventListener('input', apply);
        sort.addEventListener('change', apply);
        render(gpts);
    </script>
</body>
</html>
